<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notion Navigator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.nav{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e9e3ff;border-radius:12px;padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);max-width:500px;width:100%}
.nav-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:#6e56cf;font-weight:500;cursor:pointer;padding:7px 12px;border-radius:7px;border:1px solid #c8bef7;background:#f5f3ff;text-decoration:none;transition:background 0.15s}
.nav-btn:hover{background:#ede9fe}
.nav-btn.disabled{opacity:0.3;pointer-events:none}
.center{flex:1;text-align:center}
.page-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-count{font-size:11px;color:#888}
.dots{display:flex;gap:5px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:#e0d9ff;cursor:pointer;transition:background 0.15s}
.dot.active{background:#6e56cf}
</style>
</head>
<body>
<div class="nav">
  <a id="prev" class="nav-btn disabled" href="#">← 이전</a>
  <div class="center">
    <div class="page-title" id="title"></div>
    <div class="page-count" id="count"></div>
    <div class="dots" id="dots"></div>
  </div>
  <a id="next" class="nav-btn" href="#">다음 →</a>
</div>

<script>
// =============================================
// 여기에 페이지 목록을 입력하세요
// =============================================
const pages = [
  { icon: "📄", title: "달밤포차", url: "https://www.notion.so/1c2589a10b5c802cb703ed0afd78759b" },
  { icon: "📄", title: "Dream of DeAD", url: "https://www.notion.so/Dream-of-DeAD-1c2589a10b5c802bafa3c8003ff15907" }
];
// =============================================

// URL 파라미터에서 현재 페이지 번호 읽기 (?page=1, ?page=2, ...)
const params = new URLSearchParams(window.location.search);
let cur = parseInt(params.get('page') || '1') - 1;
cur = Math.max(0, Math.min(pages.length - 1, cur));

function render() {
  const p = pages[cur];
  document.getElementById('title').textContent = p.icon + ' ' + p.title;
  document.getElementById('count').textContent = (cur + 1) + ' / ' + pages.length;
  document.getElementById('prev').className = 'nav-btn' + (cur === 0 ? ' disabled' : '');
  document.getElementById('next').className = 'nav-btn' + (cur === pages.length - 1 ? ' disabled' : '');
  document.getElementById('dots').innerHTML = pages.map((_, i) =>
    '<div class="dot' + (i === cur ? ' active' : '') + '" onclick="jumpTo(' + i + ')"></div>'
  ).join('');
}

function jumpTo(i) {
  window.top.location.href = pages[i].url;
}

document.getElementById('prev').onclick = e => {
  e.preventDefault();
  if (cur > 0) window.top.location.href = pages[cur - 1].url;
};

document.getElementById('next').onclick = e => {
  e.preventDefault();
  if (cur < pages.length - 1) window.top.location.href = pages[cur + 1].url;
};

render();
</script>
</body>
</html>
